name: Deploy Preview

on:
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json
      
      - name: Install dependencies
        run: |
          cd backend && npm ci
          cd ../frontend && npm ci
      
      - name: Build frontend
        run: cd frontend && npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.PREVIEW_API_URL || 'http://localhost:3001' }}
      
      - name: Generate Prisma Client
        run: cd backend && npm run db:generate
        env:
          DATABASE_URL: ${{ secrets.PREVIEW_DATABASE_URL || 'postgresql://test:test@localhost:5432/test' }}
      
      - name: Comment PR with preview info
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Preview build completed successfully!\n\nTo deploy this PR:\n1. Use Railway: https://railway.app\n2. Use Render: https://render.com\n3. See [deployment guide](docs/deployment.md) for details.'
            })
